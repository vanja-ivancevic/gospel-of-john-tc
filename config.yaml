# Single source of truth for corpus, paths, seeds, thresholds.
# Every "magic constant" lives here — never hard-coded mid-script.

seed: 20260624

paths:
  ecm_negative: data/raw/ecm/negative   # records only divergent witnesses (compact)
  ecm_positive: data/raw/ecm/positive   # every witness cited at every reading -> real denominators
  transcriptions: data/raw/IGNTP_greek_john_transcriptions   # KEEP: per-MS, same B04KxVy IDs
  derived: data/derived                 # DuckDB + Parquet (gitignored, regenerable)
  collation_db: data/derived/collation.duckdb
  reports: reports

corpus:
  book: B04            # Gospel of John
  n_chapters: 21
  # Use the POSITIVE apparatus for any density/instability metric (full attestation).
  density_polarity: positive
  # ECM Greek witnesses only (clean, comparable denominator) per project decision 2026-06-24.

witness:
  # Collapse hand/corrector/lection suffixes to a base Gregory-Aland number for denominators.
  # Raw siglum is always retained; base_ga is the normalized manuscript identity.
  base_ga_regex: '^(P\d+|L\d+|\d+)'
  # Hand classification (coarse) by siglum pattern.
  corrector_markers: ['C', 'S1', 'S2', 'Z', 'corr']
  firsthand_markers: ['*']

metrics:
  # A variation unit counts toward "substantive variation" only if app type == main.
  substantive_app_types: ['main']
  coverage_app_types: ['lac']
  # Reading types that are NOT substantive textual variation (spelling/sub-variants).
  nonsubstantive_reading_types: ['subreading']
  lacuna_reading_types: ['lac']
  omission_reading_types: ['om']

validation:
  # Known textual phenomena the presence/absence method MUST recover in the correct direction.
  # (verse_id list; the gate asserts these are anomalous vs. surrounding context)
  pericope_adulterae: [B04K7V53, B04K8V1, B04K8V2, B04K8V3, B04K8V4, B04K8V5, B04K8V6, B04K8V7, B04K8V8, B04K8V9, B04K8V10, B04K8V11]
  known_interpolations: [B04K5V4]      # angel troubling the water (omitted by earliest MSS)
  appendix: [B04K21V1]                 # chapter 21 onset (debated later addition)

stats:
  fdr_alpha: 0.05
  n_permutations: 10000     # permutation null for the interpolation/date gates (full resolution)
  n_bootstrap: 10000        # default bootstrap; expensive stages override below for runtime
  # Per-stage resample counts. These are smaller than the defaults above because each draw rebuilds
  # a clustering/regression; the values are stated here so the published CIs/p-values are honest
  # about how many resamples actually back them (rather than implying the 10k default everywhere).
  genealogy_bootstrap: 100      # clade-support bootstrap in validate/genealogy
  robustness_bootstrap: 500     # leave-one-family / chapter-bootstrap in validate/robustness
  stylometry_permutations: 5000 # size-matched section permutation in analysis/stylometry
  gate_export_permutations: 2000  # PA badge recomputed for the dashboard (full gate uses n_permutations)

genealogy:
  # family recovery from our own collation (no magic constants in code)
  min_units: 200            # drop witnesses attested at fewer than this many units
  min_extant: 30            # a unit is "informative" only if >= this many witnesses are extant
  max_modal: 0.90           # ...and the modal reading covers < this fraction (i.e. contested)
  min_overlap: 100          # min co-extant units before a witness pair's coherence is scored
  n_clusters: 12            # agglomerative cut actually deployed (k)
  clade_compactness: 0.12   # a family counts as "recovered" if its clade <= this fraction of all
  monophyly_purity: 0.70    # ...or its monophyly purity >= this
  validation_k_max: 30      # validation sweeps cuts up to this k (descriptive); GATE is at n_clusters

stylometry:
  n_mfw: 100              # most-frequent lemmas for Burrows's Delta (literature: 100-500)
  window: 200            # fixed token window so Delta is not a sample-size artifact
  separation_ratio: 1.3  # large-sample diff/same Δ ratio required for the power check

dashboard:
  # "Low confidence" combines EARLY-witness depth with FAMILY breadth, because raw head-count is
  # misleading: a verse can be carried by 130 witnesses that are almost all Byzantine. A verse is
  # flagged when its early (<=500 CE) attestation is thin, OR few distinct families survive, OR the
  # effective (independence-weighted) family count is low. Byzantine dominance keeps the effective
  # count near ~1.6 across most of the gospel, so the eff threshold flags only the thinnest tail.
  low_confidence_max_early: 5          # flag verses with <= this many early witnesses
  low_confidence_min_families: 4       # ...or fewer than this many distinct families surviving
  low_confidence_min_eff_families: 1.6 # ...or effective (Simpson) family count below this
  early_witness_max_date: 500          # "early" = dated at or before this year (CE)
