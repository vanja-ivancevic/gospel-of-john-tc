name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Build everything from committed ECM data (all tables the tests query)
        run: uv run python -m john_tc.pipeline --fast
      - name: Test (incl. validation + ground-truth gates)
        run: uv run pytest
