name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Build collation store + metrics from committed ECM data
        run: |
          uv run python -m john_tc.ingest.apparatus
          uv run python -m john_tc.metrics.instability
          uv run python -m john_tc.metrics.families
          uv run python -m john_tc.metrics.dates
          uv run python -m john_tc.metrics.weighted_instability
      - name: Test (incl. validation + ground-truth gates)
        run: uv run pytest
